services:
  db:
    container_name: "app_db"
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      POSTGRES_DB: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5436
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5436:5432"
    networks:
      - main_network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx-local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - users
    networks:
      - main_network
    restart: unless-stopped

  users:
    container_name: "app_users"
    build:
      context: ../../backend/srv/users
      dockerfile: ../../../deployment/Dockerfile
      target: development
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: user
      DB_PASSWORD: user
    expose:
      - "8000"
    volumes:
      - ../../backend/srv/users:/app
      - users_venv:/app/.venv
    depends_on:
      db:
        condition: service_healthy
    networks:
      - main_network

networks:
  main_network:
    driver: bridge

volumes:
  users_venv:
