services:
  db:
    container_name: "app_db"
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      POSTGRES_DB: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5436
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5436:5432"
    networks:
      - main_network

  events:
    container_name: "app_events"
    build:
      context: ../../backend/srv/events
      dockerfile: ../../../deployment/Dockerfile
    restart: always
    environment:
      GWM_DB_HOST: db
      GWM_DB_PORT: 5432
      GWM_DB_NAME: postgres
      GWM_DB_USER: user
      GWM_DB_PASSWORD: user
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - main_network

networks:
  main_network:
    driver: bridge
